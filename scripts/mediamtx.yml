# MediaMTX Configuration for MMM-RTSPStream
# WebRTC/WHEP enabled for browser playback

# API and metrics
api: yes
apiAddress: 127.0.0.1:9997

# RTSP server (for receiving streams)
rtspAddress: :8554

# WebRTC server (for browser playback via WHEP)
webrtcAddress: :8889

# Paths - define your streams here
paths:
  # Test stream (generated by FFmpeg)
  test:
    # Uncomment to use test pattern:
    # source: publisher

